<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>注文</title>
    <link rel="stylesheet" href="../../styles/style.css">
</head>
<body>
    <main class="content">
        <div class="page-card">
            <div class="heading">
                <p class="brand">注文</p>
            </div>

            <div class="field">
                <label class="label" for="tableNumber">テーブル番号：</label>
                <input id="tableNumber" class="table-input" type="text" inputmode="numeric" placeholder="例: 5">
            </div>

            <div class="actions">
                <button id="btnBack" class="menu-btn outline">戻る</button>
                <button id="btnConfirm" class="menu-btn">決定</button>
            </div>
        </div>
    </main>

    <script src="order.js"></script>
</body>
</html>
