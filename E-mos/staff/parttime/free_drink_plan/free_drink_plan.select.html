<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>飲み放須登録 - プラン選択</title>
    <link rel="stylesheet" href="../../styles/style.css">
</head>
<body>
    <main class="content">
        <div class="page-card">
            <div class="heading">
                <p class="brand">飲み放須登録</p>
            </div>

            <div class="form-group">
                <label class="form-label">テーブル番号</label>
                <div id="tableDisplay" class="form-display"></div>
            </div>

            <div class="form-group">
                <label class="form-label">飲み放須プラン <span class="required">＊必須</span></label>
                <div class="plan-options">
                    <label class="option-label">
                        <input type="radio" name="plan" value="standard" class="option-radio">
                        <span class="option-name">スタンダード</span>
                    </label>
                    <label class="option-label">
                        <input type="radio" name="plan" value="premium" class="option-radio">
                        <span class="option-name">プレミアム</span>
                    </label>
                </div>
            </div>

            <div class="actions">
                <button id="btnBack" class="menu-btn outline" type="button">戻る</button>
                <button id="btnConfirm" class="menu-btn" type="button">決定</button>
            </div>
        </div>
    </main>

    <script src="free_drink_plan.select.js"></script>
</body>
</html>
