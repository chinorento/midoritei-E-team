<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>テーブル番号変更</title>
    <link rel="stylesheet" href="tablenumber_change.css">
</head>
<body>
    <header class="top">
        <h1>テーブル番号変更</h1>
    </header>

    <main class="center">
        <div class="page-card">
            <div class="field">
                <label class="label" for="currentTableInput">変更前</label>
                <input id="currentTableInput" class="table-input" type="text" aria-label="変更前テーブル番号入力">
            </div>
            <div class="field">
                <label class="label" for="tableInput">変更後</label>
                <input id="tableInput" class="table-input" type="text" aria-label="変更後テーブル番号入力">
            </div>

            <div class="actions">
                <button id="btnBack" class="btn outline">戻る</button>
                <button id="btnSave" class="btn primary">変更</button>
            </div>
        </div>

        <div id="confirmModal" class="modal hidden">
            <div class="modal-content">
                <p>テーブル番号を変更しますか？</p>
                <div class="modal-actions">
                    <button id="btnCancel" class="btn outline">いいえ</button>
                    <button id="btnConfirm" class="btn primary">はい</button>
                </div>
            </div>
        </div>
    </main>

    <script src="tablenumber_change.js"></script>
</body>
</html>
