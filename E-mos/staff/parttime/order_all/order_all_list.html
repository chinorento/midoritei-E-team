<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>オーダー一覧 - 卓詳細</title>
    <link rel="stylesheet" href="../../styles/style.css">
</head>
<body>
    <main class="center">
        <div class="page-card">
            <header class="top">
                <h1>オーダー一覧</h1>
                <div class="table-number">卓番：○○</div>
            </header>
            <div class="order-header">
                <span class="col-name">商品名</span>
                <span class="col-count">注文数</span>
                <span class="col-served">配膳数</span>
            </div>
            <div class="order-list">
                <div class="order-row completed" data-item="フライドポテト" data-order-count="2" data-served-count="2">
                    <span class="checkbox-placeholder"></span>
                    <span class="item-name">フライドポテト</span>
                    <span class="item-count">2</span>
                    <span class="item-served">2</span>
                </div>
                <div class="order-row" data-item="ポテトサラダ" data-order-count="4" data-served-count="1">
                    <label class="order-checkbox"><input type="checkbox" class="order-check"></label>
                    <span class="item-name">ポテトサラダ</span>
                    <span class="item-count">4</span>
                    <span class="item-served">1</span>
                </div>
                <div class="order-row" data-item="キャベツの塩だれ" data-order-count="3" data-served-count="0">
                    <label class="order-checkbox"><input type="checkbox" class="order-check"></label>
                    <span class="item-name">キャベツの塩だれ</span>
                    <span class="item-count">3</span>
                    <span class="item-served">0</span>
                </div>
                <div class="order-row" data-item="きゅうりの一本漬け" data-order-count="2" data-served-count="0">
                    <label class="order-checkbox"><input type="checkbox" class="order-check"></label>
                    <span class="item-name">きゅうりの一本漬け</span>
                    <span class="item-count">2</span>
                    <span class="item-served">0</span>
                </div>
                <div class="order-row" data-item="だし巻き" data-order-count="2" data-served-count="0">
                    <label class="order-checkbox"><input type="checkbox" class="order-check"></label>
                    <span class="item-name">だし巻き</span>
                    <span class="item-count">2</span>
                    <span class="item-served">0</span>
                </div>
                <div class="order-row completed" data-item="鶏の唐揚げ" data-order-count="2" data-served-count="2">
                    <span class="checkbox-placeholder"></span>
                    <span class="item-name">鶏の唐揚げ</span>
                    <span class="item-count">2</span>
                    <span class="item-served">2</span>
                </div>
                <div class="order-row" data-item="タコのから揚げ" data-order-count="3" data-served-count="0">
                    <label class="order-checkbox"><input type="checkbox" class="order-check"></label>
                    <span class="item-name">タコのから揚げ</span>
                    <span class="item-count">3</span>
                    <span class="item-served">0</span>
                </div>
            </div>
            <div class="actions">
                <button id="btnBack" class="menu-btn outline">戻る</button>
                <button id="btnNext" class="menu-btn">次へ</button>
            </div>
        </div>
    </main>

    <script src="order_all_list.js"></script>
</body>
</html>
