<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>商品追加 - みどり亭</title>
  <link rel="stylesheet" href="../menu/menu.css">
  <link rel="stylesheet" href="product_add.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header-title">商品追加 <span class="tip">飲み放題設定のステータスも入力する</span></div>

      <form id="addForm" action="#" method="post">
        <div class="form-row">
          <label>商品名： <span class="required">※必須</span></label>
          <input class="input-text" type="text" name="name">
          <span class="error-msg" id="nameError" style="display:none">商品名を入力してください</span>
        </div>

        <div class="form-row">
          <label>カテゴリー： <span class="required">※必須</span></label>
          <input class="input-text" type="text" name="category">
          <span class="error-msg" id="categoryError" style="display:none">カテゴリーを入力してください</span>
        </div>

        <div class="form-row">
          <label>値段： <span class="required">※必須</span></label>
          <input class="input-text" type="number" name="price">
          <span class="error-msg" id="priceError" style="display:none">値段を入力してください</span>
        </div>

        <div class="form-row">
          <label>写真： <span class="small-note">※任意</span></label>
          <input class="input-text" type="file" name="photo">
        </div>

        <div class="form-row">
          <label>備考欄： <span class="small-note">※任意</span></label>
          <input class="input-text" type="text" name="note">
        </div>

        <div class="actions">
          <a class="btn" href="../menu/menu.html">戻る</a>
          <button class="btn btn-primary" type="submit">追加</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 確認モーダル -->
  <div id="confirmAddModal" aria-hidden="true">
    <div class="modal-backdrop"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="addConfirmTitle">
      <div class="modal-content">
        <h2 id="addConfirmTitle">商品の追加を許可しますか？</h2>
        <div class="modal-actions">
          <button id="cancelAddBtn">いいえ</button>
          <button id="okAddBtn">はい</button>
        </div>
      </div>
    </div>
  </div>

  <script src="product_add.js" defer></script>
</body>
</html>
