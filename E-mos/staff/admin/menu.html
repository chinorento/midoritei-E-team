<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>社員用メニュー - みどり亭</title>
  <style>
    html,body{height:100%;margin:0;font-family:Meiryo,"Yu Gothic UI",sans-serif;background:#f5f5f5}
    .wrap{display:flex;align-items:center;justify-content:center;padding:28px}
    .card{width:320px;background:#fff;border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,0.08);padding:28px 20px;position:relative}
    .title{font-size:14px;color:#222;text-align:center;margin-bottom:18px}
    .subtitle{font-size:12px;color:#666;text-align:center;margin-top:-6px}
    .gear{position:absolute;right:12px;top:10px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:transparent;color:#222}
    .menu-btn{display:block;width:180px;margin:12px auto;padding:10px 6px;background:#eee;border:1px solid #bfbfbf;border-radius:4px;text-align:center;color:#222;cursor:pointer}
    .menu-btn-dark{background:#555;color:#fff;border:1px solid #444}
    .page-num{position:fixed;right:18px;bottom:10px;color:#999;font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="main">
      <div class="gear" aria-hidden="true">⚙</div>
      <div class="title">みどり亭　メニュー管理システム</div>
      <div class="subtitle">社員用</div>

      <div style="height:20px"></div>
      <button class="menu-btn">商品追加</button>
      <button class="menu-btn">商品削除</button>
      <button class="menu-btn">商品変更</button>
      <button class="menu-btn menu-btn-dark">アルバイト用</button>
    </div>
  </div>

  <div class="page-num">2-1</div>
</body>
</html>
