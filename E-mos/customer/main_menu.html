<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>みどり亭 - メニュー</title>
  <link rel="stylesheet" href="main_menu.css" />
</head>
<body>
  <main class="page-container">
    <section class="content-area">
      <aside class="sidebar">
        <nav class="category-nav">
          <button class="category active">おすすめ</button>
          <button class="category">飲みもの</button>
          <button class="category">スピード</button>
          <button class="category">焼鳥(タレ)</button>
          <button class="category">焼鳥(塩)</button>
          <button class="category">一品</button>
          <button class="category">デザート</button>
        </nav>
      </aside>

      <section class="menu-list">
        <div class="section-title">おすすめ</div>
        <div class="menu-grid">
          <article class="menu-card" data-price="150">
            <div class="menu-card__image">串</div>
            <div class="menu-card__body">
              <h2>かわ</h2>
              <p>外はパリッと香ばしく、中はジューシーな人気串。</p>
              <p class="menu-meta">アレルギー：鶏肉</p>
              <p class="menu-price">¥150（税込）</p>
            </div>
          </article>

          <article class="menu-card" data-price="150">
            <div class="menu-card__image">串</div>
            <div class="menu-card__body">
              <h2>レバー</h2>
              <p>濃厚な旨みととろける触感が楽しめる逸品。</p>
              <p class="menu-meta">アレルギー：鶏肉</p>
              <p class="menu-price">¥150（税込）</p>
            </div>
          </article>

          <article class="menu-card" data-price="300">
            <div class="menu-card__image">枝豆</div>
            <div class="menu-card__body">
              <h2>枝豆</h2>
              <p>まずはこれ。塩味がクセになる定番おつまみ。</p>
              <p class="menu-meta">アレルギー：大豆</p>
              <p class="menu-price">¥300（税込）</p>
            </div>
          </article>

          <article class="menu-card" data-price="500">
            <div class="menu-card__image">卵</div>
            <div class="menu-card__body">
              <h2>だし巻き卵</h2>
              <p>ふわふわ食感と出汁の香りが広がります。</p>
              <p class="menu-meta">アレルギー：卵・小麦</p>
              <p class="menu-price">¥500（税込）</p>
            </div>
          </article>

          <article class="menu-card" data-price="450">
            <div class="menu-card__image">プリン</div>
            <div class="menu-card__body">
              <h2>プリン</h2>
              <p>なめらか食感と優しい甘さのデザート。</p>
              <p class="menu-price">¥450（税込）</p>
            </div>
          </article>
        </div>
      </section>
    </section>
  </main>

  <nav class="bottom-nav">
    <button>呼び出し・会計</button>
    <button>注文履歴</button>
    <button>カート確認</button>
  </nav>

  <div class="cart-drawer hidden" id="cartDrawer">
    <div class="cart-drawer__overlay"></div>
    <aside class="cart-drawer__panel">
      <div class="cart-drawer__header">
        <h2>カート一覧</h2>
      </div>
      <div class="cart-drawer__body">
        <p class="cart-drawer__empty">カートは空です</p>
        <ul class="cart-drawer__list"></ul>
      </div>
      <div class="cart-drawer__actions">
        <button class="cart-drawer__button cart-drawer__button--secondary" type="button">閉じる</button>
        <button class="cart-drawer__button cart-drawer__button--primary" type="button">注文確定</button>
      </div>
    </aside>
  </div>

  <div class="menu-modal hidden" id="menuModal">
    <div class="menu-modal__overlay"></div>
    <div class="menu-modal__dialog">
      <div class="menu-modal__image">串</div>
      <div class="menu-modal__content">
        <h2 class="menu-modal__title">かしら</h2>
        <p class="menu-modal__subtitle">個数を選択してください</p>
        <div class="menu-modal__quantity">
          <button class="quantity-button" type="button" data-action="decrease">−</button>
          <input class="quantity-input" type="text" value="1" readonly />
          <button class="quantity-button" type="button" data-action="increase">＋</button>
        </div>
        <div class="menu-modal__actions">
          <button class="menu-modal__button menu-modal__button--secondary" type="button">戻る</button>
          <button class="menu-modal__button menu-modal__button--primary" type="button">確定</button>
        </div>
      </div>
    </div>
  </div>

  <script src="main_menu.js"></script>
</body>
</html>
